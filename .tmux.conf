# set shell
set -g default-shell /bin/zsh

# enable 256-colors
set -g default-terminal 'screen-256color'
set -ag terminal-overrides ',xterm-256color*:RGB'

# reset prefix to 'C-b'
unbind C-a
set-option -g prefix C-b
bind-key C-b send-prefix

# some sane defaults
set -g base-index 1
set -g detach-on-destroy off
set -g renumber-windows on
set -g allow-rename off

# set vim keybindings in copy mode
set-window-option -g mode-keys vi
set -g mouse on

# quick pane cycling
unbind ^B
bind ^B select-pane -t :.+

# open new window in current working directory
bind c new-window -c "#{pane_current_path}"

# quick reload tmux config
bind r source-file ‾/.tmux.conf

# update session working dir to current pane path
bind M-c attach-session -c "#{pane_current_path}"

# switch panes using Alt-arrow without prefix
bind -n M-Left select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up select-pane -U
bind -n M-Down select-pane -D

# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-yank'

# --> Gruvbox Dark palette (matching starship prompt)
set -ogq @thm_fg "#fbf1c7"
set -ogq @thm_bg "#282828"

set -ogq @thm_red "#cc241d"
set -ogq @thm_green "#98971a"
set -ogq @thm_yellow "#d79921"
set -ogq @thm_orange "#d65d0e"
set -ogq @thm_blue "#458588"
set -ogq @thm_purple "#b16286"
set -ogq @thm_aqua "#689d6a"

set -ogq @thm_bg1 "#3c3836"
set -ogq @thm_bg3 "#665c54"
set -ogq @thm_fg4 "#a89984"

# status left look and feel
set -g status-left-length 100
set -g status-left ""
set -ga status-left "#{?client_prefix,#{#[fg=#{@thm_yellow}]蟬ｶ#[bg=#{@thm_yellow},fg=#{@thm_bg},bold] #S #[bg=default,fg=#{@thm_yellow}]蟬ｴ},#{#[fg=#{@thm_bg1}]蟬ｶ#[bg=#{@thm_bg1},fg=#{@thm_fg},bold] #S #[bg=default,fg=#{@thm_bg1}]蟬ｴ}}"
set -ga status-left " "
set -ga status-left "#[fg=#{@thm_bg1}]蟬ｶ#[bg=#{@thm_bg1},fg=#{@thm_fg}] #{=/-32/...:#{s|/$USER|‾|:#{b:pane_current_path}}} #[bg=default,fg=#{@thm_bg1}]蟬ｴ"
set -ga status-left "#{?window_zoomed_flag, #[fg=#{@thm_bg1}]蟬ｶ#[bg=#{@thm_bg1}#,fg=#{@thm_fg}]  zoom #[bg=default#,fg=#{@thm_bg1}]蟬ｴ,}"
set -ga status-left " "
set -ga status-left "#[fg=#{@thm_bg1}]蟬ｶ#[bg=#{@thm_bg1},fg=#{@thm_fg}] #(cd #{pane_current_path}; git rev-parse --abbrev-ref HEAD 2>/dev/null | sed -E 's/(.{30}).*/¥¥1.../') #[bg=default,fg=#{@thm_bg1}]蟬ｴ"

# status right look and feel
set -g status-right-length 100
set -g status-right ""
set -ga status-right "#[fg=#{@thm_bg1}]蟬ｶ#[bg=#{@thm_bg1},fg=#{@thm_fg}] 㬚û %H:%M #[bg=default,fg=#{@thm_bg1}]蟬ｴ"

# Configure Tmux
set -g status-position top
set -g status-style "bg=default"
set -g status-justify "absolute-centre"
set -g message-style "bg=#{@thm_bg1},fg=#{@thm_fg}"
set -g message-command-style "bg=#{@thm_bg1},fg=#{@thm_fg}"

# pane border look and feel
setw -g pane-border-status top
setw -g pane-border-format ""
setw -g pane-active-border-style "bg=default,fg=#{@thm_fg4}"
setw -g pane-border-style "bg=default,fg=#{@thm_bg3}"
setw -g pane-border-lines single

# window look and feel
set -wg automatic-rename on
set -g automatic-rename-format "Window"

set -g window-status-format "#[fg=#{@thm_bg3}]蟬ｶ#[bg=#{@thm_bg3}]#{?window_last_flag,#[fg=#{@thm_fg}],#[fg=#{@thm_fg4}]} #I#{?#{!=:#{window_name},Window},: #W,} #[bg=default,fg=#{@thm_bg3}]蟬ｴ"
set -g window-status-style "bg=default"
set -g window-status-last-style "fg=#{@thm_yellow}"
set -g window-status-activity-style "bg=default"
set -g window-status-bell-style "bg=default"
set -gF window-status-separator "#[bg=default] "

set -g window-status-current-format "#[fg=#{@thm_yellow}]蟬ｶ#[bg=#{@thm_yellow},fg=#{@thm_bg},bold] #I#{?#{!=:#{window_name},Window},: #W,} #[bg=default,fg=#{@thm_yellow}]蟬ｴ"
set -g window-status-current-style "bg=default"

# URL Launcher
bind-key C-u run-shell -b "tmux capture-pane -J -p | grep -oE '(https?)://[a-zA-Z0-9./?=_%:-]*' | fzf-tmux -d20 --multi --bind alt-a:select-all,alt-d:deselect-all | xargs open"

# Session Launcher
bind-key -r f run-shell -b "tmux neww ‾/.local/bin/tmux-sessionizer"
bind-key -r H run-shell "‾/.local/bin/tmux-sessionizer $FS_HOME"
bind-key -r J run-shell "‾/.local/bin/tmux-sessionizer ‾/notes"

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '‾/.tmux/plugins/tpm/tpm'
